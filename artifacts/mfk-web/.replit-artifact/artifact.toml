kind = "web"
previewPath = "/"
title = "MFK — Smart Vehicle Diagnostics"
version = "1.0.0"
id = "artifacts/mfk-web"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18892

[services.development]
run = "pnpm --filter @workspace/mfk-web run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mfk-web", "run", "build" ]
publicDir = "artifacts/mfk-web/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18892"
BASE_PATH = "/"
