        make: { type: string }
        model: { type: string }
        year: { type: integer }
        plateNumber: { type: string, nullable: true }
        odometerKm: { type: integer }
        healthScore: { type: integer }
        activeDtcCount: { type: integer }
        lastSeenAt: { type: string, format: date-time, nullable: true }

    AdminLiveSession:
