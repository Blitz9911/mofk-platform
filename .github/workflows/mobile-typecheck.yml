name: Mobile Typecheck

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "artifacts/mfk-mobile/**"
      - "lib/api-client-react/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/mobile-typecheck.yml"

  pull_request:
    paths:
      - "artifacts/mfk-mobile/**"
      - "lib/api-client-react/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - "tsconfig.base.json"
      - ".github/workflows/mobile-typecheck.yml"

permissions:
  contents: read

jobs:
  typecheck:
    name: Check mobile TypeScript
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build API client types
        run: pnpm exec tsc --build lib/api-client-react/tsconfig.json --force --pretty false

      - name: Typecheck mobile application
        run: pnpm --filter @workspace/mfk-mobile typecheck
