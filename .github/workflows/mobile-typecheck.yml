name: Mobile Typecheck

on:
  workflow_dispatch:

  push:
    branches:
      - main
    paths:
      - "artifacts/mfk-mobile/**"
      - "lib/api-client-react/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"
      - ".github/workflows/mobile-typecheck.yml"

  pull_request:
    paths:
      - "artifacts/mfk-mobile/**"
      - "lib/api-client-react/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "pnpm-workspace.yaml"

permissions:
  contents: read

jobs:
  typecheck:
    name: Check mobile TypeScript
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck mobile application
        run: pnpm --filter @workspace/mfk-mobile typecheck
